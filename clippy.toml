# `clippy` configuration for the KayStichs Protocol contracts workspace.
#
# **`clippy.toml` only accepts configuration variables** — lint-level
# directives (`warn`, `deny`, `allow` on `clippy::*` or `arithmetic-overflow`
# style names) belong in `Cargo.toml` under `[lint]` / `[lints]`. Putting
# them here caused `cargo clippy --all-targets --all-features -- -D warnings`
# in CI to die at parse time. Keep this file conservative.

# Allow API-additive-only evolution across minor versions.
avoid-breaking-exported-api = false

# Tune clippy::too_many_lines threshold for Soroban contracts that have
# several tightly-related `match` blocks in a single function.
too-many-lines-threshold = 200
