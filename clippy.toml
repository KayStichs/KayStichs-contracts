# `clippy` configuration for the KayStichs Protocol contracts workspace.
#
# These are **advisory** unless CI sets `RUSTFLAGS="-D warnings"`. The CI
# runs `cargo clippy --all-targets --all-features -- -D warnings` already;
# this file tightens a few project-specific lints so lint passes stay green.

# Smart-contract friendly: prefer unfold over `?` would be too strict.
# We deny the most-clearly-actionable lints:
avoid-breaking-exported-api = false

# Numeric arithmetic is on i128: warn at suspicious magic thresholds.
arithmetic-overflow        = "warn"
integer-arithmetic         = "warn"

# Soroban uses panics for control flow in some legacy specs — keep them visible.
# (Default is `deny`, which is what we want.)
missing-panics-doc         = "allow"

# Encourage `todo!()` / `unimplemented!()` to be tracked.
todo-unicode               = "warn"

# Our function signatures use `BytesN<32>`; allow the longer-named reads.
too-long-first-doc-paragraph = "allow"

# Standard upper bound for "too_many_lines" — we hit it on a few contracts.
too-many-lines-threshold    = 200
