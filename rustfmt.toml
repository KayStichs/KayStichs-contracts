# `rustfmt` configuration for the KayStichs Protocol contracts workspace.
#
# Only **stable** rustfmt options are listed here — anything unstable will be
# ignored (or fail) on the CI toolchain pinned by `.github/workflows/ci.yml`.
# Upgrade this file with care: nightlies re-enable more options, but
# `dtolnay/rust-toolchain@stable` is what CI runs against.
#
# Stable defaults that we want to be explicit about:
hard_tabs            = false
tab_spaces           = 4
max_width            = 100
use_small_heuristics = "Default"
edition              = "2021"
